name: SDK image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/gnuradio/gnuradio4-sdk

jobs:
  publish:
    name: Build and publish SDK image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SDK image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.sdk
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/gnuradio/gnuradio4
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=GNU Radio 4 SDK image for downstream out-of-tree module builds
            org.opencontainers.image.licenses=MIT

      - name: Validate SDK image contents
        shell: bash
        run: |
          docker run --rm "${IMAGE_NAME}:${GITHUB_SHA}" bash -lc '
            set -euo pipefail
            printf "GNURADIO4_PREFIX=%s\n" "${GNURADIO4_PREFIX}"
            test -d /opt/gnuradio4
            ls -la /opt/gnuradio4
            if [ -d /opt/gnuradio4/lib ]; then
              ls -la /opt/gnuradio4/lib
            fi
            if [ -d /opt/gnuradio4/lib64 ]; then
              ls -la /opt/gnuradio4/lib64
            fi
            find /opt/gnuradio4 -path "*/cmake/*" \( -name "*Config.cmake" -o -name "*Targets.cmake" \) -print -quit | grep .
          '
