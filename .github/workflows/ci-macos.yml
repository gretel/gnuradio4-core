name: macOS CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: "macOS | ${{ matrix.compiler.label }} | Debug"
    runs-on: macos-26
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ matrix.compiler.label }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - label: Clang 20
            brew_pkg: llvm@20
            prefix: /opt/homebrew/opt/llvm@20
            cache_key: clang20
    env:
      CC: ${{ matrix.compiler.prefix }}/bin/clang
      CXX: ${{ matrix.compiler.prefix }}/bin/clang++

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve macOS SDK
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          echo "SDKROOT=${sdk_path}" >> "$GITHUB_ENV"
          echo "SDK path: ${sdk_path}"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install LLVM and sccache and dependencies
        run: brew install ${{ matrix.compiler.brew_pkg }} sccache cpp-httplib pkgconf

      - name: Log compiler version
        run: ${{ matrix.compiler.prefix }}/bin/clang --version

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "MacOS ${{ matrix.compiler.label }}"

      - name: Restore FetchContent
        id: restore-fetchcontent
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/build/_deps
          key: fetchContent-macos-${{ matrix.compiler.cache_key }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchContent-macos-${{ matrix.compiler.cache_key }}

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DENABLE_COVERAGE=OFF \
            -DGR_USE_FETCHCONTENT_DEPS=ON \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -DCMAKE_EXE_LINKER_FLAGS="-L${{ matrix.compiler.prefix }}/lib/c++ -Wl,-rpath,${{ matrix.compiler.prefix }}/lib/c++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-L${{ matrix.compiler.prefix }}/lib/c++ -Wl,-rpath,${{ matrix.compiler.prefix }}/lib/c++"

      - name: Build
        run: cmake --build build

      - name: Execute tests
        working-directory: ${{ github.workspace }}/build
        run: ctest --output-on-failure --timeout 120

      - name: Execute main binary
        working-directory: ${{ github.workspace }}/build
        run: ./core/src/main

      - name: Install core SDK
        run: cmake --install build --prefix "${{ github.workspace }}/install-core"

      - name: Build installed SDK smoke project
        run: |
          cmake -S test_external/minimal_blocklib -B build-smoke \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-core" \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}"
          cmake --build build-smoke

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "MacOS ${{ matrix.compiler.label }}" "build/"

      - name: Save FetchContent
        if: always() && steps.restore-fetchcontent.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/build/_deps
          key: ${{ steps.restore-fetchcontent.outputs.cache-primary-key }}
