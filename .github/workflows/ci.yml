name: common/pull-request CI

on:
  pull_request:

jobs:
  dco:
    name: "DCO"
    runs-on: "ubuntu-latest"
    steps:
      - name: Check commit signoffs
        uses: actions/github-script@v8
        with:
          script: |
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const missing = commits.filter(({ commit }) => !/^Signed-off-by:\s.+$/im.test(commit.message));

            for (const { sha } of missing) {
              core.error(`Commit ${sha} is missing a Signed-off-by line`);
            }

            if (missing.length > 0) {
              core.setFailed(`${missing.length} commit(s) missing DCO signoff`);
            }

  restyled:
    name: "Restyled"
    runs-on: ubuntu-latest
    concurrency:
      group: Restyled-${{ github.ref }}
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Ensure fork is public
        if: ${{ github.event.pull_request.head.repo.private }}
        run: |
          echo "Private forks are not supported for restyling" >&2
          exit 1

      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: restyled-io/actions/setup@v4

      - id: restyler
        uses: restyled-io/actions/run@v4
        with:
          fail-on-differences: true

  build:
    name: "${{ matrix.name }}"
    needs: [dco, restyled]
    runs-on: "ubuntu-latest"
    concurrency:
      # Cancel running builds inside work (PR) branches, build all revisions for the main branch
      group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ matrix.name }}
      cancel-in-progress: true
    container:
      image: "${{ matrix.image }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 24.04 | gcc-14 | Release"
            cache_key: ubuntu-2404-gcc14-release
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0
            cc: gcc-14
            cxx: g++-14
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=OFF"
          - name: "Ubuntu 26.04 | gcc | Release"
            cache_key: ubuntu-2604-gcc-release
            image: ghcr.io/gnuradio/ci:ubuntu-26.04-4.0
            cc: gcc
            cxx: g++
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=OFF"
          - name: "Fedora 44 | clang | Debug"
            cache_key: fedora-44-clang-debug
            image: ghcr.io/gnuradio/ci:fedora-44-4.0
            cc: clang
            cxx: clang++
            cmake-build-type: Debug
            cmake_flags: "-DADDRESS_SANITIZER=ON"
          - name: "Ubuntu 24.04 | Emscripten | Release"
            cache_key: ubuntu-2404-emscripten-release
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0-emscripten
            cc: emcc
            cmake_wrapper: emcmake
            cmake-build-type: Release
            cmake_flags: "-DENABLE_COVERAGE=OFF -DCMAKE_CROSSCOMPILING_EMULATOR=${SYSTEM_NODE} -DGNURADIO_PARSE_REGISTRATIONS_TOOL_CXX_COMPLILER=g++-14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "${{ matrix.name }}"

      - name: Cache fetchContent
        uses: actions/cache@v5
        env:
          cache-name: cache-fetchContent-cache
        with:
          path: ${{runner.workspace}}/build/_deps
          key: fetchContent-${{ runner.os }}-${{ matrix.cache_key }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchContent-${{ runner.os }}-${{ matrix.cache_key }}

      - name: Configure
        if: matrix.cmake_wrapper == null
        shell: bash
        env:
          CC: "${{ matrix.cc }}"
          CXX: "${{ matrix.cxx }}"
        run: >
          cmake \
            -S . \
            -B ../build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DENABLE_COVERAGE=OFF \
            ${{ matrix.cmake_flags }}

      - name: Configure CMake Emscripten
        if: matrix.cmake_wrapper == 'emcmake'
        shell: bash
        run: |
          export SYSTEM_NODE=`which node` # use system node instead of old version distributed with emsdk
          $EMSDK_HOME/emsdk activate $EMSDK_VERSION
          source $EMSDK_HOME/emsdk_env.sh
          ${{ matrix.cmake_wrapper }} \
          cmake \
            -S . \
            -B ../build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: |
          if [ -n "${EMSDK_HOME:-}" ] && [ -f "${EMSDK_HOME}/emsdk_env.sh" ]; then
            source "${EMSDK_HOME}/emsdk_env.sh"
          fi
          cmake --build ../build

      - name: execute tests
        if: matrix.cc != 'gcc-14' || matrix.cmake-build-type != 'Debug'
        env:
          DISABLE_SENSITIVE_TESTS: 1 # disables tests which are sensitive to execution speed and will not run with instrumented code
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure

      - name: execute native main binary
        if: matrix.cmake_wrapper == null
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ./core/src/main

      - name: execute wasm main binary with nodejs
        if: matrix.cmake_wrapper != null
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: node ./core/src/main.js

      - name: install core SDK
        if: matrix.cmake_wrapper == null
        shell: bash
        run: cmake --install ../build --prefix "${{ runner.workspace }}/install-core"

      - name: build installed SDK smoke project
        if: matrix.cmake_wrapper == null
        shell: bash
        env:
          CC: "${{ matrix.cc }}"
          CXX: "${{ matrix.cxx }}"
        run: |
          smoke_cmake_flags=()
          if [[ "${{ matrix.cmake_flags }}" == *"-DADDRESS_SANITIZER=ON"* ]]; then
            smoke_cmake_flags+=(
              "-DCMAKE_CXX_FLAGS=-fsanitize=address"
              "-DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address"
              "-DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=address"
            )
          fi
          cmake -S test_external/minimal_blocklib -B "${{ runner.workspace }}/build-smoke" \
            -DCMAKE_PREFIX_PATH="${{ runner.workspace }}/install-core" \
            -DCMAKE_C_COMPILER="${{ matrix.cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.cxx }}" \
            "${smoke_cmake_flags[@]}"
          cmake --build "${{ runner.workspace }}/build-smoke"

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "${{ matrix.name }}" "../build"

  windows-build:
    name: "Windows ARM64 | LLVM MinGW | Debug"
    runs-on: windows-11-arm
    env:
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_MAXSIZE: 500M
      CCACHE_COMPILERTYPE: clang
    defaults:
      run:
        shell: bash
    concurrency:
      group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-windows
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache ccache
        id: cache-ccache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/ccache-bin
          key: ccache-4.13.6-windows-aarch64

      - name: Cache ccache objects
        id: cache-ccache-objects
        uses: actions/cache@v6
        with:
          path: ~/.ccache
          key: ccache-obj-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ccache-obj-windows-

      - name: Cache LLVM MinGW
        id: cache-mingw
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/llvm-mingw
          key: llvm-mingw-20260616-ucrt-aarch64

      - name: Install dependencies
        shell: pwsh
        run: |
          # ccache
          $ccacheDir = "$env:RUNNER_TEMP\ccache-bin"
          if (-not (Test-Path "$ccacheDir/ccache.exe")) {
            Write-Host "Downloading ccache..."
            $ccacheUrl = "https://github.com/ccache/ccache/releases/download/v4.13.6/ccache-4.13.6-windows-aarch64.zip"
            $ccacheZip = "$env:RUNNER_TEMP\ccache.zip"
            Invoke-WebRequest -Uri $ccacheUrl -OutFile $ccacheZip
            Expand-Archive -Path $ccacheZip -DestinationPath $ccacheDir -Force
            # Move files from nested dir up one level
            if (Test-Path "$ccacheDir/ccache-4.13.6-windows-aarch64") {
              Get-ChildItem "$ccacheDir/ccache-4.13.6-windows-aarch64" | Move-Item -Destination $ccacheDir
              Remove-Item "$ccacheDir/ccache-4.13.6-windows-aarch64"
            }
            Write-Host "ccache downloaded and extracted"
          } else {
            Write-Host "ccache found in cache"
          }
          echo "$ccacheDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # LLVM MinGW toolchain
          $mingwUrl = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/llvm-mingw-20260616-ucrt-aarch64.zip"
          $mingwZip = "$env:RUNNER_TEMP\llvm-mingw.zip"
          $mingwDest = "$env:RUNNER_TEMP\llvm-mingw"
          if (-not (Test-Path "$mingwDest/llvm-mingw-20260616-ucrt-aarch64")) {
            Write-Host "Downloading LLVM MinGW..."
            Invoke-WebRequest -Uri $mingwUrl -OutFile $mingwZip
            Expand-Archive -Path $mingwZip -DestinationPath $mingwDest -Force
          } else {
            Write-Host "LLVM MinGW toolchain found in cache"
          }
          $mingwBin = Join-Path $mingwDest "llvm-mingw-20260616-ucrt-aarch64" "bin"
          echo "$mingwBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Log compiler version
        run: clang++ --version

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DENABLE_COVERAGE=OFF \
            -DADDRESS_SANITIZER=OFF \
            -DGR_USE_FETCHCONTENT_DEPS=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Execute tests
        env:
          DISABLE_SENSITIVE_TESTS: 1
        working-directory: ${{ github.workspace }}/build
        run: ctest --output-on-failure --timeout 120 -E "qa_Tags|qa_thread_affinity"

      - name: Execute main binary
        working-directory: ${{ github.workspace }}/build
        run: ./core/src/main.exe

      - name: Install core SDK
        run: cmake --install build --prefix "${{ github.workspace }}/install-core"

      - name: Build installed SDK smoke project
        run: |
          cmake -S test_external/minimal_blocklib -B build-smoke \
            -G Ninja \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-core" \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang
          cmake --build build-smoke