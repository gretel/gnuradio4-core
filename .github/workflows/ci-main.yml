name: main branch CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: "ubuntu-latest"
    concurrency:
      group: ${{ github.workflow }}-${{ github.run_id }}-${{ matrix.name }}
      cancel-in-progress: false
    container:
      image: "${{ matrix.image }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 24.04 | gcc-14 | Release"
            cache_key: ubuntu-2404-gcc14-release
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0
            cc: gcc-14
            cxx: g++-14
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=ON"
          - name: "Ubuntu 26.04 | gcc | Release"
            cache_key: ubuntu-2604-gcc-release
            image: ghcr.io/gnuradio/ci:ubuntu-26.04-4.0
            cc: gcc
            cxx: g++
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=ON"
          - name: "Ubuntu 26.04 | gcc | Debug"
            cache_key: ubuntu-2604-gcc-debug
            image: ghcr.io/gnuradio/ci:ubuntu-26.04-4.0
            cc: gcc
            cxx: g++
            cmake-build-type: Debug
            cmake_flags: "-DADDRESS_SANITIZER=OFF"
          - name: "Ubuntu 24.04 | clang-20 | Release"
            cache_key: ubuntu-2404-clang20-release
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0
            cc: clang-20
            cxx: clang++-20
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=ON"
          - name: "Fedora 44 | clang | Release"
            cache_key: fedora-44-clang-release
            image: ghcr.io/gnuradio/ci:fedora-44-4.0
            cc: clang
            cxx: clang++
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=ON"
          - name: "Ubuntu 24.04 | Emscripten | Release"
            cache_key: ubuntu-2404-emscripten-release
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0-emscripten
            cc: emcc
            cmake_wrapper: emcmake
            cmake-build-type: Release
            cmake_flags: "-DENABLE_COVERAGE=OFF -DCMAKE_CROSSCOMPILING_EMULATOR=${SYSTEM_NODE} -DGNURADIO_PARSE_REGISTRATIONS_TOOL_CXX_COMPLILER=g++-14"
          - name: "Ubuntu 24.04 | Emscripten | Debug"
            cache_key: ubuntu-2404-emscripten-debug
            image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0-emscripten
            cc: emcc
            cmake_wrapper: emcmake
            cmake-build-type: Debug
            cmake_flags: "-DENABLE_COVERAGE=OFF -DCMAKE_CROSSCOMPILING_EMULATOR=${SYSTEM_NODE} -DGNURADIO_PARSE_REGISTRATIONS_TOOL_CXX_COMPLILER=g++-14"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "${{ matrix.name }}"

      - name: Cache fetchContent
        uses: actions/cache@v5
        env:
          cache-name: cache-fetchContent-cache
        with:
          path: ${{runner.workspace}}/build/_deps
          key: fetchContent-${{ runner.os }}-${{ matrix.cache_key }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchContent-${{ runner.os }}-${{ matrix.cache_key }}

      - name: Configure
        if: matrix.cmake_wrapper == null
        shell: bash
        env:
          CC: "${{ matrix.cc }}"
          CXX: "${{ matrix.cxx }}"
        run: >
          cmake  \
              -S .  \
              -B ../build \
              -DCMAKE_COLOR_DIAGNOSTICS=ON \
              -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
              -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
              ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
              -DENABLE_COVERAGE=OFF \
              -DCMAKE_COMPILE_COMMANDS=ON \
              -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
              -DCMAKE_C_COMPILER=${{ matrix.cc }} \
              ${{ matrix.cmake_flags }}

      - name: Configure CMake Emscripten
        if: matrix.cmake_wrapper == 'emcmake'
        shell: bash
        run: |
          export SYSTEM_NODE=`which node` # use system node instead of old version distributed with emsdk
          $EMSDK_HOME/emsdk activate $EMSDK_VERSION
          source $EMSDK_HOME/emsdk_env.sh
          ${{ matrix.cmake_wrapper }} cmake -S . -B ../build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: |
          test -f $EMSDK_HOME/emsdk_env.sh && source $EMSDK_HOME/emsdk_env.sh
          cmake --build ../build

      - name: execute tests
        if: matrix.cc != 'gcc-14' || matrix.cmake-build-type != 'Debug'
        env:
          DISABLE_SENSITIVE_TESTS: 1 # disables tests which are sensitive to execution speed and will not run with instrumented code
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure

      - name: execute native main binary
        if: matrix.cmake_wrapper == null
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ./core/src/main

      - name: execute wasm main binary with nodejs
        if: matrix.cmake_wrapper != null
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: node ./core/src/main.js

      - name: install core SDK
        if: matrix.cmake_wrapper == null
        shell: bash
        run: cmake --install ../build --prefix "${{ runner.workspace }}/install-core"

      - name: build installed SDK smoke project
        if: matrix.cmake_wrapper == null
        shell: bash
        run: |
          cmake -S test_external/minimal_blocklib -B "${{ runner.workspace }}/build-smoke" \
            -DCMAKE_PREFIX_PATH="${{ runner.workspace }}/install-core"
          cmake --build "${{ runner.workspace }}/build-smoke"

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "${{ matrix.name }}" "../build"

  coverage:
    name: "GCC-14 Coverage"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gnuradio/ci:ubuntu-24.04-4.0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "Coverage"

      - name: Configure (coverage)
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B ../build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DENABLE_COVERAGE=ON \
            -DADDRESS_SANITIZER=OFF

      - name: Build
        run: cmake --build ../build

      - name: Execute tests
        env:
          DISABLE_SENSITIVE_TESTS: 1 # disables tests which are sensitive to execution speed and will not run with instrumented code
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure

      - name: Install core SDK
        shell: bash
        run: cmake --install ../build --prefix "${{ runner.workspace }}/install-core"

      - name: Build installed SDK smoke project
        shell: bash
        run: |
          cmake -S test_external/minimal_blocklib -B "${{ runner.workspace }}/build-smoke" \
            -DCMAKE_PREFIX_PATH="${{ runner.workspace }}/install-core"
          cmake --build "${{ runner.workspace }}/build-smoke"

      - name: Generate coverage report
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: cmake --build . --target coverage

      - name: Run sonar-scanner
        shell: bash
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: sonar-scanner

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "Coverage" "../build"
